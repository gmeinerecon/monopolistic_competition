<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monopolistic Competition – Host Dashboard</title>

    <link rel="stylesheet" href="/styles.css" />

    <style>
        /* --- Mobile adjustments --- */
        @media (max-width: 720px) {
            .grid-3, .grid-2 {
                grid-template-columns: 1fr !important;
            }
            canvas {
                width: 100% !important;
                height: auto !important;
            }
            .title-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
        }

        .legend-item {
            display: flex;
            align-items;
            font-size: 0.9rem;
            background: #f1f5f9;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
        }

        .legend-color-box {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            border: 1px solid #94a3b8;
        }
    </style>
</head>

<body>
<div class="container">

    <h1>Host Dashboard</h1>
    <p class="muted">Students join at <strong>/student</strong>.</p>

    <!-- ========== ROUND CONTROL ========== -->
    <div class="card">
        <div class="title-row">
            <h2>Class & Round Control</h2>
            <div class="badge">Round: <span id="roundSpan">-</span></div>
        </div>

        <div class="row" style="margin-top:8px">
            <button class="btn" id="resetBtn">Start / Reset Game (Soft)</button>
            <button class="btn" id="computeBtn">Advance & Compute Round</button>
            <button class="btn secondary" id="downloadCsvBtn" disabled>Download CSV</button>
            <button class="btn secondary" id="clearChartsBtn" disabled>Clear History</button>
            <button class="btn secondary" id="hardResetBtn">Kick All (Hard Reset)</button>
        </div>

        <!-- NEW: Submission counter -->
        <div id="submitStatus"
             class="badge secondary"
             style="margin-top:6px; background:#e2e8f0; color:#475569;">
            Waiting for submissions...
        </div>

        <div id="roster" style="margin-top:10px"></div>
    </div>

    <!-- ========== PARAMETERS ========== -->
    <div class="card" style="margin-top:12px">
        <h2>Market, Substitution & Cost Parameters</h2>

        <div class="grid-3">
            <div>
                <label>Base demand (A)</label>
                <input type="number" id="baseDemand" />
                <label>Brand lift (θ)</label>
                <input type="number" id="brandLiftMarket" />
                <label>Price drag (φ)</label>
                <input type="number" id="priceDragMarket" />
                <label>Shock mean (μ)</label>
                <input type="number" id="shockMean" />
                <label>Shock std dev (σ)</label>
                <input type="number" id="shockStd" />
            </div>

            <div>
                <label>β (brand) in utility</label>
                <input type="number" step="0.1" id="betaBrand" />
                <label>β (price) in utility</label>
                <input type="number" step="0.1" id="betaPrice" />
                <label>Brand persistence (ρ)</label>
                <input type="number" step="0.05" id="brandPersistence" />
            </div>

            <div>
                <label>Fixed cost (F)</label>
                <input type="number" id="fixedCost" />
